services:
  db:
    image: postgres:16-alpine
    container_name: ticketmanager-db
    restart: always
    ports:
      - "127.0.0.1:5432:5432"  # Only reachable from within the VPS
    environment:
      POSTGRES_DB: ${DB_NAME:-ticketmanager}
      POSTGRES_USER: ${DB_USERNAME:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      TZ: Asia/Kolkata
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - /etc/localtime:/etc/localtime:ro
      - /etc/timezone:/etc/timezone:ro
    networks:
      - app-network

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ticketmanager-app
    image: ${APP_IMAGE_NAME:-ticketmanager-app}:${APP_IMAGE_TAG:-latest}
    restart: always
    depends_on:
      - db
    expose:
      - "9090"
    environment:
      # Database configuration matching the 'db' service
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: ${DB_NAME:-ticketmanager}
      DB_USERNAME: ${DB_USERNAME:-postgres}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_SSLMODE: disable
      DB_CHANNEL_BINDING: disable
      
      # App specific environment variables
      APP_JWT_SECRET: ${APP_JWT_SECRET}
      APP_BASE_URL: ${APP_BASE_URL:-http://localhost:9090}
      APP_MAIL_ENABLED: ${APP_MAIL_ENABLED:-false}
      APP_UPLOAD_DIR: /app/uploads
      APP_MASKING_ENABLED: ${APP_MASKING_ENABLED:-true}
      
      # Mail configuration
      MAIL_HOST: ${MAIL_HOST:-smtp.gmail.com}
      MAIL_PORT: ${MAIL_PORT:-587}
      MAIL_USERNAME: ${MAIL_USERNAME}
      MAIL_PASSWORD: ${MAIL_PASSWORD}
      MAIL_SMTP_AUTH: ${MAIL_SMTP_AUTH:-true}
      MAIL_STARTTLS: ${MAIL_STARTTLS:-true}
      MAIL_SSL_ENABLE: ${MAIL_SSL_ENABLE:-false}
      APP_MAIL_FROM_ADDRESS: ${APP_MAIL_FROM_ADDRESS}
      APP_MAIL_FROM_NAME: ${APP_MAIL_FROM_NAME}

      # SMS configuration
      APP_SMS_ENABLED: ${APP_SMS_ENABLED:-false}
      APP_SMS_API_KEY: ${APP_SMS_API_KEY}
      APP_SMS_SENDER: ${APP_SMS_SENDER}
      APP_SMS_API_URL: ${APP_SMS_API_URL}
      
      # Spring Boot Profile
      SPRING_PROFILES_ACTIVE: prod
      TZ: Asia/Kolkata
    volumes:
      - ./uploads:/app/uploads
      - /etc/localtime:/etc/localtime:ro
      - /etc/timezone:/etc/timezone:ro
    networks:
      - app-network

  nginx:
    image: nginx:alpine
    container_name: ticketmanager-nginx
    restart: always
    environment:
      TZ: Asia/Kolkata
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - ./nginx/certbot:/var/www/certbot
      - /etc/localtime:/etc/localtime:ro
      - /etc/timezone:/etc/timezone:ro
      - /opt/nginx/maintenance:/usr/share/nginx/html/maintenance
#    depends_on:
#      - app
    networks:
      - app-network

networks:
  app-network:
    driver: bridge

volumes:
  postgres_data:
  certbot_etc:
  certbot_var:
