spring:
  application:
    name: TicketManager
  config:
    import: optional:file:.env[.properties]
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}
  jpa:
    show-sql: false
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
        default_batch_fetch_size: 25
  thymeleaf:
    cache: false
  sql:
    init:
      mode: always
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 25MB

server:
  port: 9090

app:
  jwt:
    secret: ${APP_JWT_SECRET:change-me-change-me-change-me-change-me}
    expiration: 86400000
  base-url: ${APP_BASE_URL:http://localhost:9090}
  mail:
    enabled: ${APP_MAIL_ENABLED:false}
    from-address: ${APP_MAIL_FROM_ADDRESS:no-reply@ticketmanager.local}
    from-name: ${APP_MAIL_FROM_NAME:Ticket Manager}
  upload-dir: ${APP_UPLOAD_DIR:uploads}
  masking:
    enabled: ${APP_MASKING_ENABLED:true}
  sms:
    enabled: ${APP_SMS_ENABLED:false}
    api-key: ${APP_SMS_API_KEY:}
    sender: ${APP_SMS_SENDER:VIEWIT}
    api-url: ${APP_SMS_API_URL:https://www.smsalert.co.in/api/push.json}
