server:
  port: 9090
  forward-headers-strategy: native

spring:
  datasource:
    url: jdbc:postgresql://${DB_HOST:db}:${DB_PORT:5432}/${DB_NAME:ticketmanager}?sslmode=${DB_SSLMODE:disable}&channel_binding=${DB_CHANNEL_BINDING:disable}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
      idle-timeout: 300000
      connection-timeout: 20000
      max-lifetime: 1200000
      leak-detection-threshold: 60000

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: false
        jdbc:
          batch_size: 25
          batch_versioned_data: true
        order_inserts: true
        order_updates: true
        connection:
          provider_disables_autocommit: true

  mail:
    host: ${MAIL_HOST}
    port: ${MAIL_PORT}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: ${MAIL_SMTP_AUTH:true}
          starttls:
            enable: ${MAIL_STARTTLS:true}
          ssl:
            enable: ${MAIL_SSL_ENABLE:false}

app:
  masking:
    enabled: ${APP_MASKING_ENABLED:true}
  mail:
    from-address: ${APP_MAIL_FROM_ADDRESS:no-reply@ticketmanager.local}
    from-name: ${APP_MAIL_FROM_NAME:Ticket Manager}
