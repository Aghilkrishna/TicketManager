<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <th:block th:replace="~{fragments/layout :: head('Email Notification')}"></th:block>
</head>
<body>
<div class="app-shell">
    <aside th:replace="~{fragments/layout :: sidebar('admin', 'email-notifications')}"></aside>
    <div class="main-panel">
        <header th:replace="~{fragments/layout :: topbar('Email Notification', 'Control which application actions trigger outbound email and SMS')}"></header>
        <main class="content-area">
            <section class="hero-banner glass-card mb-4">
                <h1 class="h2 fw-bold mb-2">Email Notification Settings</h1>
                <p class="mb-0">Enable or disable email and SMS delivery for specific application actions. In-app notifications continue to work independently.</p>
            </section>

            <section class="form-card glass-card">
                <div class="d-flex justify-content-between align-items-center gap-3 flex-wrap mb-4">
                    <div>
                        <div class="section-title">Notification Actions</div>
                        <div class="table-subtitle">Only the enabled channels below will send outbound alerts.</div>
                    </div>
                    <button id="saveEmailNotificationSettings" class="btn btn-primary" type="button">Save Settings</button>
                </div>
                <div id="emailNotificationMessage" class="small mb-3"></div>
                <div id="emailNotificationList" class="row g-3"></div>
            </section>
        </main>
    </div>
</div>
<script th:src="@{/js/app.js}"></script>
<script>
let emailNotificationSettings = [];

function renderEmailNotificationSettings() {
  document.getElementById('emailNotificationList').innerHTML = emailNotificationSettings.map(setting => `
    <div class="col-12">
      <label class="d-block border rounded-4 p-3 h-100" style="cursor:pointer;">
        <div class="d-flex justify-content-between align-items-start gap-3 flex-wrap">
          <div>
            <div class="fw-semibold">${setting.label}</div>
            <div class="text-muted small mt-2">${setting.description}</div>
          </div>
          <div class="d-flex gap-4 align-items-center mt-1">
            <div class="form-check form-switch">
              <input class="form-check-input" type="checkbox" data-channel="email" data-action="${setting.action}" ${setting.emailEnabled ? 'checked' : ''}>
              <span class="small ms-2">Email</span>
            </div>
            <div class="form-check form-switch">
              <input class="form-check-input" type="checkbox" data-channel="sms" data-action="${setting.action}" ${setting.smsEnabled ? 'checked' : ''}>
              <span class="small ms-2">SMS</span>
            </div>
          </div>
        </div>
      </label>
    </div>
  `).join('') || '<div class="col-12"><div class="empty-state">No email notification actions found.</div></div>';
}

async function loadEmailNotificationSettings() {
  const res = await fetch('/api/admin/email-notifications');
  emailNotificationSettings = await res.json();
  renderEmailNotificationSettings();
}

document.getElementById('saveEmailNotificationSettings').addEventListener('click', async () => {
  const button = document.getElementById('saveEmailNotificationSettings');
  const message = document.getElementById('emailNotificationMessage');
  clearInlineAlert(message);
  setButtonLoading(button, true, 'Saving settings...');
  const payload = emailNotificationSettings.map(setting => ({
    action: setting.action,
    emailEnabled: Boolean(document.querySelector(`#emailNotificationList input[data-channel="email"][data-action="${setting.action}"]`)?.checked),
    smsEnabled: Boolean(document.querySelector(`#emailNotificationList input[data-channel="sms"][data-action="${setting.action}"]`)?.checked)
  }));
  const res = await fetch('/api/admin/email-notifications', {
    method: 'PUT',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify(payload)
  });
  const data = await res.json().catch(() => ([]));
  setButtonLoading(button, false);
  showInlineAlert(message, res.ok ? 'Email notification settings updated successfully.' : ((data && data.message) || 'Failed to update email notification settings.'), res.ok ? 'success' : 'danger', res.ok ? 'Settings Saved' : 'Save Failed');
  if (res.ok) {
    emailNotificationSettings = data;
    renderEmailNotificationSettings();
  }
});

loadEmailNotificationSettings();
</script>
</body>
</html>
