<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <th:block th:replace="~{fragments/layout :: head('Tickets')}"></th:block>
</head>
<body>
<div class="app-shell">
    <aside th:replace="~{fragments/layout :: sidebar('tickets', ticketTab)}"></aside>
    <div class="main-panel">
        <header th:replace="~{fragments/layout :: topbar('', '')}"></header>
        <main class="content-area">
            <section class="toolbar-card glass-card mb-4">
                <div class="d-flex justify-content-between align-items-center flex-wrap gap-3 mb-3">
                    <div>
                        <div class="section-title" th:text="${ticketPageTitle}">My Open Tickets</div>
                        <div class="table-subtitle" th:text="${ticketSubtitle}">Search, sort, and navigate your assigned tickets.</div>
                    </div>
                    <a class="btn btn-primary btn-lg"
                       th:if="${currentFeatures.contains('FEATURE_TICKETS_MANAGE') or currentFeatures.contains('FEATURE_TICKETS_CREATE_STANDARD') or currentFeatures.contains('FEATURE_TICKETS_CREATE_VENDOR')}"
                       href="/tickets/create">
                        <i class="bi bi-plus-circle me-2"></i>
                        <span th:text="${currentFeatures.contains('FEATURE_TICKETS_CREATE_VENDOR') and !currentFeatures.contains('FEATURE_TICKETS_CREATE_STANDARD') ? 'Create Vendor Ticket' : 'Create Ticket'}">Create Ticket</span>
                    </a>
                </div>
                <div class="toolbar-grid">
                    <input id="search" class="form-control" placeholder="Search by ID, title, status, priority, assigned user">
                    <select id="status" class="form-select">
                        <option value="">All status</option>
                        <option>LEADS</option><option>OPEN</option><option>SITE_VISITED</option><option>IN_PROGRESS</option><option>ON_HOLD</option><option>RESOLVED</option><option>CLOSED</option><option>CANCELLED</option>
                    </select>
                    <select id="priority" class="form-select">
                        <option value="">All priority</option>
                        <option>LOW</option><option>MEDIUM</option><option>HIGH</option><option>CRITICAL</option>
                    </select>
                    <div th:if="${!currentRoles.contains('ROLE_VENDOR')}">
                        <input id="vendorSearch" class="form-control" placeholder="Vendor company">
                        <div id="vendorResults" class="autosuggest-panel mt-2" hidden></div>
                        <input type="hidden" id="vendorUserId">
                    </div>
                    <select id="sortBy" class="form-select">
                        <option value="id">Ticket ID</option>
                        <option value="title">Title</option>
                        <option value="serviceType">Service Type</option>
                        <option value="createdBy">Created By</option>
                        <option value="status">Status</option>
                        <option value="priority">Priority</option>
                        <option value="updatedAt" selected>Last Updated</option>
                    </select>
                    <select id="direction" class="form-select"><option value="desc">Descending</option><option value="asc">Ascending</option></select>
                    <button id="applyFilters" class="btn btn-dark">Apply</button>
                </div>
            </section>

            <section class="table-card glass-card">
                <div class="table-responsive">
                    <table class="table align-middle">
                        <thead>
                        <tr>
                            <th>Ticket ID</th>
                            <th>Type</th>
                            <th>Title</th>
                            <th>Priority</th>
                            <th>Status</th>
                            <th>Vendor</th>
                            <th>Created By</th>
                            <th>Created Date</th>
                            <th>Scheduled Date</th>
                            <th>Updated Date</th>
                            <th>Assigned To</th>
                            <th class="text-end">Actions</th>
                        </tr>
                        </thead>
                        <tbody id="ticketTable"></tbody>
                    </table>
                </div>
                <div id="ticketEmpty" class="empty-state d-none">No tickets matched the current selection.</div>
                <div class="pagination-wrap">
                    <div class="d-flex align-items-center gap-3 flex-wrap">
                        <div id="paginationSummary" class="text-muted small"></div>
                        <div class="d-flex align-items-center gap-2">
                            <label class="small text-muted" for="pageSize">Records per page</label>
                            <select id="pageSize" class="form-select form-select-sm" style="width: auto;">
                                <option value="25">25</option>
                                <option value="50">50</option>
                                <option value="100" selected>100</option>
                                <option value="200">200</option>
                            </select>
                        </div>
                    </div>
                    <div id="paginationList" class="pagination-list"></div>
                </div>
            </section>
        </main>
    </div>
</div>
<script th:src="@{/js/app.js}"></script>
<script src="https://cdn.jsdelivr.net/npm/sockjs-client@1/dist/sockjs.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/stompjs@2.3.3/lib/stomp.min.js"></script>
<script th:inline="javascript">
const forcedStatuses = /*[[${forcedStatuses}]]*/ [];
const canEditTickets = /*[[${currentFeatures.contains('FEATURE_TICKETS_MANAGE') or currentFeatures.contains('FEATURE_SITE_VISIT_EDIT')}]]*/ false;
const assignedOnly = /*[[${assignedOnly}]]*/ true;
const createdOnly = /*[[${createdOnly}]]*/ false;
const adminScope = /*[[${adminScope}]]*/ false;
const canViewAllTickets = /*[[${currentFeatures.contains('FEATURE_TICKETS_ALL_VIEW')}]]*/ false;
let currentPage = 0;
let pageSize = 100;
const refreshTicketsDebounced = debounce(() => loadTickets(), 400);
let lastTicketRefreshToastAt = 0;

function escapeHtml(value) {
  return (value || '').replace(/[&<>"']/g, s => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[s]));
}

function hasRole(user, roleName) {
  return Array.isArray(user.roles) && user.roles.includes(roleName);
}

function userSuggestionMarkup(user) {
  const company = user.companyName ? escapeHtml(user.companyName) : escapeHtml(user.username || 'Vendor');
  const subtitle = escapeHtml(user.email || user.phone || '');
  return `
    <button type="button" class="autosuggest-item" data-id="${user.id}">
      <img class="autosuggest-avatar" src="/api/users/avatar/${user.id}" alt="${company}" loading="lazy" decoding="async">
      <div class="autosuggest-body">
        <div class="autosuggest-title-row"><span class="autosuggest-title">${company}</span></div>
        <div class="autosuggest-subtitle">${subtitle}</div>
      </div>
      <span class="autosuggest-action" aria-hidden="true"><i class="bi bi-building"></i></span>
    </button>`;
}

function showSuggestionState(target, content, visible = true) {
  target.innerHTML = content;
  target.hidden = !visible;
}

async function searchUsers(query, target, filterFn, onSelect) {
  if (!query || query.trim().length < 2) {
    document.getElementById('vendorUserId').value = '';
    showSuggestionState(target, '', false);
    return;
  }
  showSuggestionState(target, '<div class="autosuggest-empty autosuggest-loading"><span class="spinner-border spinner-border-sm" aria-hidden="true"></span><span>Searching vendors...</span></div>');
  const res = await fetch('/api/users/search?query=' + encodeURIComponent(query));
  const users = (await res.json()).filter(filterFn);
  showSuggestionState(target, users.map(userSuggestionMarkup).join('') || '<div class="autosuggest-empty">No matching vendors found.</div>', true);
  target.querySelectorAll('button[data-id]').forEach(button => button.addEventListener('click', () => {
    const user = users.find(item => item.id === Number(button.dataset.id));
    onSelect(user);
    showSuggestionState(target, '', false);
  }));
}

function formatDateTime(value) {
  if (!value) return '-';
  return new Date(value).toLocaleString();
}

function formatDate(value) {
  if (!value) return '-';
  return new Date(value + 'T00:00:00').toLocaleDateString();
}

function renderPagination(data) {
  const list = document.getElementById('paginationList');
  const summary = document.getElementById('paginationSummary');
  list.innerHTML = '';
  const start = data.totalElements === 0 ? 0 : (data.number * data.size) + 1;
  const end = Math.min((data.number + 1) * data.size, data.totalElements);
  summary.textContent = `Showing ${start}-${end} of ${data.totalElements} tickets · Page ${data.number + 1} of ${Math.max(data.totalPages, 1)}`;
  const addButton = (label, page, disabled = false, active = false) => {
    const button = document.createElement('button');
    button.className = 'page-link-btn' + (active ? ' active' : '');
    button.textContent = label;
    button.disabled = disabled;
    button.addEventListener('click', () => {
      currentPage = page;
      loadTickets();
    });
    list.appendChild(button);
  };
  addButton('Prev', Math.max(currentPage - 1, 0), data.first);
  for (let i = 0; i < data.totalPages; i++) {
    addButton(String(i + 1), i, false, i === data.number);
  }
  addButton('Next', Math.min(currentPage + 1, Math.max(data.totalPages - 1, 0)), data.last);
}

async function loadTickets() {
  const params = new URLSearchParams({
    adminScope: String(adminScope),
    assignedOnly: String(assignedOnly),
    createdOnly: String(createdOnly),
    page: String(currentPage),
    size: String(pageSize),
    search: document.getElementById('search').value,
    statuses: document.getElementById('status').value || forcedStatuses.join(','),
    priority: document.getElementById('priority').value,
    vendorUserId: document.getElementById('vendorUserId').value,
    sortBy: document.getElementById('sortBy').value,
    direction: document.getElementById('direction').value
  });
  const res = await fetch('/api/tickets?' + params.toString());
  const data = await res.json();
  const body = document.getElementById('ticketTable');
  const empty = document.getElementById('ticketEmpty');
  body.innerHTML = '';
  const tickets = data.content || [];
  empty.classList.toggle('d-none', tickets.length > 0);
  tickets.forEach(ticket => {
    const assignedUser = ticket.assignedTo || 'Unassigned';
    body.innerHTML += `
      <tr>
        <td>#${ticket.id}</td>
        <td>${ticket.serviceTypeLabel || '-'}</td>
        <td><a class="fw-semibold text-decoration-none" href="/tickets/view?id=${ticket.id}">${ticket.title}${ticket.hasAttachments ? ' <i class="bi bi-paperclip ms-1 text-muted" title="Attachments available"></i>' : ''}</a></td>
        <td><span class="priority-pill ${ticket.priority}">${ticket.priority}</span></td>
        <td><span class="status-pill ${ticket.status}">${ticket.status}</span></td>
        <td>${ticket.vendorCompanyName || '-'}</td>
        <td>${ticket.createdBy || '-'}</td>
        <td>${formatDateTime(ticket.createdAt)}</td>
        <td>${formatDate(ticket.scheduleDate)}</td>
        <td>${formatDateTime(ticket.updatedAt)}</td>
        <td>${assignedUser}</td>
        <td class="text-end">
          <a class="btn btn-sm btn-outline-secondary" href="/tickets/view?id=${ticket.id}" title="View"><i class="bi bi-eye"></i></a>
          ${canEditTickets && (ticket.status !== 'CLOSED' || canViewAllTickets) ? `<a class="btn btn-sm btn-outline-primary" href="/tickets/edit?id=${ticket.id}" title="Edit"><i class="bi bi-pencil"></i></a>` : ''}
        </td>
      </tr>`;
  });
  renderPagination(data);
}

if (forcedStatuses.length === 1) {
  document.getElementById('status').value = forcedStatuses[0];
}
document.getElementById('applyFilters').addEventListener('click', () => {
  currentPage = 0;
  loadTickets();
});
document.getElementById('status').addEventListener('change', () => {
  currentPage = 0;
  loadTickets();
});
document.getElementById('priority').addEventListener('change', () => {
  currentPage = 0;
  loadTickets();
});
document.getElementById('pageSize').addEventListener('change', event => {
  pageSize = Number(event.target.value) || 100;
  currentPage = 0;
  loadTickets();
});
document.getElementById('vendorSearch').addEventListener('input', debounce(event => searchUsers(
  event.target.value,
  document.getElementById('vendorResults'),
  user => hasRole(user, 'ROLE_VENDOR'),
  user => {
    document.getElementById('vendorSearch').value = user.companyName || user.username;
    document.getElementById('vendorUserId').value = user.id;
    currentPage = 0;
    loadTickets();
  }
), 220));
loadTickets();

if (typeof SockJS !== 'undefined' && typeof Stomp !== 'undefined') {
  const socket = new SockJS('/ws');
  const refreshClient = Stomp.over(socket);
  refreshClient.connect({}, () => {
    refreshClient.subscribe('/topic/tickets-refresh', () => {
      refreshTicketsDebounced();
      const now = Date.now();
      if (now - lastTicketRefreshToastAt > 5000) {
        showAppAlert('Ticket list auto-refreshed to show the latest updates.', 'info', 'Live Update');
        lastTicketRefreshToastAt = now;
      }
    });
  });
}
</script>
</body>
</html>
