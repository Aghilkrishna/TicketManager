<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Verify Email</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container py-5">
    <div class="card shadow-sm mx-auto" style="max-width: 500px;">
        <div class="card-body text-center">
            <h1 class="h4 mb-3">Verify Email</h1>
            <button id="verifyBtn" class="btn btn-primary d-none" th:if="${token != null}">Verify account</button>
            <div id="message" class="mt-3"></div>
        </div>
    </div>
</div>
<script th:inline="javascript">
const token = /*[[${token}]]*/ null;
const btn = document.getElementById('verifyBtn');
async function verifyToken() {
  const message = document.getElementById('message');
  message.className = 'mt-3 text-muted';
  message.textContent = 'Verifying your account...';
  const res = await fetch('/api/auth/verify?token=' + encodeURIComponent(token));
  const text = await res.text();
  message.className = 'mt-3 ' + (res.ok ? 'text-success' : 'text-danger');
  message.textContent = text;
}
if (btn && token) {
  btn.addEventListener('click', verifyToken);
  verifyToken();
}
</script>
</body>
</html>
