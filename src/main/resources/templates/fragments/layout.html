<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<body>
<th:block th:fragment="head(title)">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title th:text="${title}">Ticket Manager</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link th:href="@{/css/app.css}" rel="stylesheet">
</th:block>

<aside th:fragment="sidebar(activePage, activeSubPage)" class="sidebar">
    <div class="sidebar-header">
        <div class="sidebar-brand">
            <div class="brand-mark">TM</div>
            <div class="brand-copy">
                <div class="brand-title">Ticket Manager</div>
                <!--<div class="brand-subtitle">Service operations center</div>-->
            </div>
        </div>
        <button class="icon-button sidebar-collapse-btn" id="sidebarCollapse" type="button" title="Toggle menu">
            <i class="bi bi-layout-sidebar-inset"></i>
        </button>
    </div>
    <nav class="sidebar-nav">
        <a class="nav-item" th:classappend="${activePage == 'dashboard'} ? ' active'" href="/dashboard"><i class="bi bi-grid"></i><span class="nav-label">Dashboard</span></a>
        <a class="nav-item" th:if="${currentFeatures.contains('FEATURE_TICKETS_VIEW')}" th:classappend="${activePage == 'tickets'} ? ' active'" href="/tickets"><i class="bi bi-ticket-detailed"></i><span class="nav-label" th:text="${currentRoles.contains('ROLE_VENDOR') ? 'My Tickets' : 'Ticket Management'}">Ticket Management</span></a>
        <div class="sidebar-subnav" th:if="${activePage == 'tickets'}">
            <a class="subnav-item" th:classappend="${activeSubPage == 'open'} ? ' active'" href="/tickets" th:text="${currentRoles.contains('ROLE_VENDOR') ? 'My Tickets' : 'My Open Tickets'}">My Open Tickets</a>
            <a class="subnav-item" th:classappend="${activeSubPage == 'closed'} ? ' active'" href="/tickets/closed" th:text="${currentRoles.contains('ROLE_VENDOR') ? 'My Closed Tickets' : 'Closed Tickets'}">Closed Tickets</a>
        </div>
        <a class="nav-item" th:if="${currentFeatures.contains('FEATURE_PROFILE_ACCESS')}" th:classappend="${activePage == 'profile'} ? ' active'" href="/profile"><i class="bi bi-person-circle"></i><span class="nav-label">User Profile</span></a>
        <a class="nav-item" th:if="${currentFeatures.contains('FEATURE_CHAT_ACCESS')}" th:classappend="${activePage == 'chat'} ? ' active'" href="/chat"><i class="bi bi-chat-dots"></i><span class="nav-label">Chat</span></a>
        <a class="nav-item" th:if="${currentRoles.contains('ROLE_ADMIN')}" th:classappend="${activePage == 'admin'} ? ' active'" href="/admin/support-tickets"><i class="bi bi-shield-check"></i><span class="nav-label">Admin</span></a>
        <div class="sidebar-subnav" th:if="${activePage == 'admin' and currentRoles.contains('ROLE_ADMIN')}">
            <a class="subnav-item" th:classappend="${activeSubPage == 'support-tickets'} ? ' active'" href="/admin/support-tickets">All Support Tickets</a>
            <a class="subnav-item" th:classappend="${activeSubPage == 'users'} ? ' active'" href="/admin/users">User Management</a>
            <a class="subnav-item" th:classappend="${activeSubPage == 'roles'} ? ' active'" href="/admin/roles">Role Management</a>
            <a class="subnav-item" th:classappend="${activeSubPage == 'role-features'} ? ' active'" href="/admin/role-features">Role Features</a>
            <a class="subnav-item" th:classappend="${activeSubPage == 'email-notifications'} ? ' active'" href="/admin/email-notifications">Email Notification</a>
        </div>
    </nav>

</aside>

<header th:fragment="topbar(pageTitle, pageSubtitle)" class="topbar">
    <button class="btn btn-outline-light btn-sm d-lg-none" id="sidebarToggle"><i class="bi bi-list"></i></button>
    <div></div>
    <div class="topbar-actions">
        <a class="profile-button" href="/profile" title="Profile">
            <img th:if="${currentHasProfileImage}" th:src="@{/api/users/profile/picture}" alt="Profile" class="rounded-circle" style="width: 32px; height: 32px; object-fit: cover;">
            <span th:if="${!currentHasProfileImage}" class="d-inline-flex align-items-center justify-content-center rounded-circle bg-light text-dark fw-semibold" style="width: 32px; height: 32px;" th:text="${currentDisplayName != null ? #strings.substring(currentDisplayName,0,1).toUpperCase() : 'P'}">P</span>
            <span th:text="${currentDisplayName != null ? currentDisplayName : 'Profile'}">Profile</span>
        </a>
        <button class="icon-button position-relative" id="notificationToggle" type="button" title="Notifications">
            <i class="bi bi-bell"></i>
            <span id="notificationCount" class="notification-badge d-none">0</span>
        </button>
        <button class="icon-button danger" id="logoutBtn" type="button" title="Logout"><i class="bi bi-box-arrow-right"></i></button>
        <div id="notificationPanel" class="notification-panel d-none">
            <div class="notification-panel-header">Notifications</div>
            <div id="notificationList" class="notification-list"></div>
        </div>
    </div>
</header>
</body>
</html>
