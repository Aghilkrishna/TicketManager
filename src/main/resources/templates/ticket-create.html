<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <th:block th:replace="~{fragments/layout :: head('Create Ticket')}"></th:block>
</head>
<body>
<div class="app-shell">
    <aside th:replace="~{fragments/layout :: sidebar('tickets', 'open')}"></aside>
    <div class="main-panel">
        <header th:replace="~{fragments/layout :: topbar('Create Ticket', 'Capture service, customer, and vendor details in one structured request')}"></header>
        <main class="content-area">
            <section class="hero-banner glass-card mb-4">
                <div class="text-uppercase small opacity-75">Support Workflow</div>
                <h1 class="h2 fw-bold mb-2" th:text="${currentRoles.contains('ROLE_VENDOR') ? 'Create Vendor Ticket' : 'Create Ticket'}">Create Ticket</h1>
                <p class="mb-0">Use the guided sections below to register the issue, service requirements, location, attachments, and opening notes.</p>
            </section>

            <form id="ticketForm" class="row g-4" enctype="multipart/form-data">
                <input type="hidden" name="address" id="addressSummary">
                <input type="hidden" name="locationLink" id="locationLinkMirror">

                <div class="col-12">
                    <section class="form-card glass-card">
                        <div class="row g-4">
                            <div class="col-lg-8">
                                <div class="section-title mb-3">Ticket Section</div>
                                <div class="row g-3">
                                    <div class="col-12">
                                        <label class="form-label">Title</label>
                                        <input class="form-control form-control-lg" name="title" placeholder="Short issue summary" maxlength="150" required>
                                    </div>
                                    <div class="col-12">
                                        <label class="form-label">Description</label>
                                        <textarea class="form-control" name="description" rows="5" placeholder="Describe the issue, expected service, and context" maxlength="4000" required></textarea>
                                    </div>
                                    <div class="col-md-4">
                                        <label class="form-label">Type of Service</label>
                                        <select class="form-select" name="serviceType">
                                            <option value="">Select service type</option>
                                            <option value="INSTALLATION">Installation</option>
                                            <option value="REPAIR">Repair</option>
                                            <option value="MAINTENANCE">Maintenance</option>
                                        </select>
                                    </div>
                                    <div class="col-md-4">
                                        <label class="form-label">Schedule Date</label>
                                        <input class="form-control" type="date" name="scheduleDate">
                                    </div>
                                    <div class="col-md-4">
                                        <label class="form-label">Status</label>
                                        <select class="form-select" name="status">
                                            <option selected value="OPEN">Open</option>
                                            <option value="IN_PROGRESS">In Progress</option>
                                            <option value="ON_HOLD">On Hold</option>
                                            <option value="RESOLVED">Resolved</option>
                                            <option value="CLOSED">Closed</option>
                                        </select>
                                    </div>
                                    <div class="col-md-4">
                                        <label class="form-label">Priority</label>
                                        <select class="form-select" name="priority">
                                            <option value="LOW">Low</option>
                                            <option selected value="MEDIUM">Medium</option>
                                            <option value="HIGH">High</option>
                                            <option value="CRITICAL">Critical</option>
                                        </select>
                                    </div>
                                    <div class="col-md-8" th:if="${currentRoles.contains('ROLE_ADMIN') or currentRoles.contains('ROLE_MANAGER')}">
                                        <label class="form-label">Assigned User</label>
                                        <input id="assignedSearch" class="form-control" placeholder="Search support user by name, email or mobile">
                                        <div id="assignedResults" class="assignment-results mt-2"></div>
                                        <input type="hidden" name="assignedToId" id="assignedToId">
                                    </div>
                                </div>
                            </div>

                            <div class="col-lg-4">
                                <div class="section-title mt-4 mb-3">Attachments</div>
                                <label class="form-label">Related Files</label>
                                <input class="form-control" type="file" name="files" multiple>
                                <div class="small text-muted mt-2">Attach quotations, photos, checklists, or any supporting documents.</div>
                            </div>
                        </div>
                    </section>
                </div>

                <div class="col-xl-7">
                    <section class="form-card glass-card h-100">
                        <div class="section-title mb-3">Customer Section</div>
                        <div class="row g-3">
                            <div class="col-md-6">
                                <label class="form-label">Customer Name</label>
                                <input class="form-control" name="customerName" placeholder="Customer or site contact name" maxlength="150">
                            </div>
                            <div class="col-md-6">
                                <label class="form-label">Flat / House No.</label>
                                <input class="form-control address-part" name="customerFlat" placeholder="Flat, unit or house number" maxlength="120">
                            </div>
                            <div class="col-12">
                                <label class="form-label">Street / Building / Area</label>
                                <input class="form-control address-part" name="customerStreet" placeholder="Building, street, landmark or area" maxlength="150">
                            </div>
                            <div class="col-md-4">
                                <label class="form-label">City</label>
                                <input class="form-control address-part" name="customerCity" placeholder="City" maxlength="80">
                            </div>
                            <div class="col-md-4">
                                <label class="form-label">State</label>
                                <select class="form-select address-part" name="customerState">
                                    <option value="">Select state</option>
                                    <option th:each="state : ${indiaStates}" th:value="${state}" th:text="${state}"></option>
                                </select>
                            </div>
                            <div class="col-md-4">
                                <label class="form-label">Pincode</label>
                                <input class="form-control address-part" name="customerPincode" placeholder="Pincode" maxlength="20">
                            </div>
                            <div class="col-12">
                                <label class="form-label">Customer Location</label>
                                <input class="form-control" id="customerLocationLink" name="customerLocationLink" type="url" placeholder="https://maps.google.com/...">
                            </div>
                            <div class="col-12">
                                <label class="form-label">Address Preview</label>
                                <textarea class="form-control" id="addressPreview" rows="3" readonly placeholder="Customer address summary will appear here"></textarea>
                            </div>
                        </div>
                    </section>
                </div>

                <div class="col-xl-5" th:if="${currentRoles.contains('ROLE_ADMIN') or currentRoles.contains('ROLE_MANAGER')}">
                    <section class="form-card glass-card h-100">
                        <div class="section-title mb-3">Price Section</div>
                        <div class="row g-3">
                            <div class="col-12">
                                <label class="form-label">Pricing Model</label>
                                <select class="form-select" name="pricingModel">
                                    <option value="">Select pricing model</option>
                                    <option value="FIXED_PRICE">Fixed Price</option>
                                    <option value="HOURLY_RATE">Hourly Rate</option>
                                </select>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label">Estimated Cost</label>
                                <input class="form-control" name="estimatedCost" type="number" step="0.01" min="0" placeholder="0.00">
                            </div>
                            <div class="col-md-6">
                                <label class="form-label">Actual Cost</label>
                                <input class="form-control" name="actualCost" type="number" step="0.01" min="0" placeholder="0.00">
                            </div>
                            <div class="col-12">
                                <label class="form-label">Additional Notes</label>
                                <textarea class="form-control" name="additionalNotes" rows="8" placeholder="Commercial notes, approvals, or service completion remarks" maxlength="3000"></textarea>
                            </div>
                        </div>
                    </section>
                </div>

                <div class="col-12 d-flex gap-2 flex-wrap">
                    <button class="btn btn-primary btn-lg" type="submit">Create Ticket</button>
                    <a class="btn btn-outline-secondary btn-lg" href="/tickets">Cancel</a>
                </div>
                <div id="message" class="small col-12"></div>
            </form>
        </main>
    </div>
</div>
<script th:src="@{/js/app.js}"></script>
<script th:inline="javascript">
function hasRole(user, roleName) {
  return Array.isArray(user.roles) && user.roles.includes(roleName);
}

function updateAddressPreview() {
  const parts = [
    document.querySelector('[name="customerFlat"]').value,
    document.querySelector('[name="customerStreet"]').value,
    document.querySelector('[name="customerCity"]').value,
    document.querySelector('[name="customerState"]').value,
    document.querySelector('[name="customerPincode"]').value
  ].map(value => (value || '').trim()).filter(Boolean);
  const summary = parts.join(', ');
  document.getElementById('addressPreview').value = summary;
  document.getElementById('addressSummary').value = summary;
}

function mirrorLocationLink() {
  document.getElementById('locationLinkMirror').value = document.getElementById('customerLocationLink').value.trim();
}

async function searchUsers(query, target, filterFn, onSelect) {
  if (!query) {
    target.innerHTML = '';
    return;
  }
  const res = await fetch('/api/users/search?query=' + encodeURIComponent(query));
  const users = (await res.json()).filter(filterFn);
  target.innerHTML = users.map(user => `
    <div class="assignment-item">
      <div>
        <strong>${user.username}</strong>
        <div class="small text-muted">${user.email}${user.phone ? ' · ' + user.phone : ''}</div>
      </div>
      <button type="button" class="btn btn-sm btn-outline-primary" data-id="${user.id}">Select</button>
    </div>
  `).join('') || '<div class="small text-muted px-2 py-1">No matching users found.</div>';
  target.querySelectorAll('button[data-id]').forEach(button => button.addEventListener('click', () => {
    const user = users.find(item => item.id === Number(button.dataset.id));
    onSelect(user);
    target.innerHTML = '';
  }));
}

document.querySelectorAll('.address-part').forEach(field => field.addEventListener('input', updateAddressPreview));
document.getElementById('customerLocationLink').addEventListener('input', mirrorLocationLink);
if (document.getElementById('assignedSearch')) {
  document.getElementById('assignedSearch').addEventListener('input', event => searchUsers(
    event.target.value,
    document.getElementById('assignedResults'),
    user => !hasRole(user, 'ROLE_VENDOR'),
    user => {
      document.getElementById('assignedSearch').value = `${user.username} (${user.email})`;
      document.getElementById('assignedToId').value = user.id;
    }
  ));
}

document.getElementById('ticketForm').addEventListener('submit', async event => {
  event.preventDefault();
  updateAddressPreview();
  mirrorLocationLink();
  const form = event.target;
  const data = new FormData(form);
  const res = await fetch('/api/tickets', {method: 'POST', body: data});
  const payload = await res.json().catch(() => ({}));
  if (res.ok) {
    window.location.href = '/tickets';
    return;
  }
  const message = document.getElementById('message');
  message.className = 'small col-12 text-danger';
  message.textContent = payload.message || 'Ticket save failed';
});

updateAddressPreview();
mirrorLocationLink();
</script>
</body>
</html>
