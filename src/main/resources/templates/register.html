<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <th:block th:replace="~{fragments/layout :: head('Register')}"></th:block>
</head>
<body>
<div class="auth-wrap">
    <section class="auth-banner">
        <div class="d-flex align-items-center gap-3 mb-4">
            <div class="brand-mark">TM</div>
            <div>
                <div class="fw-bold" style="font-size: 1.8rem; line-height: 1.1;">Ticket Manager</div>
                <div style="font-size: 0.88rem; opacity: 0.78;">Secure account access and support operations</div>
            </div>
        </div>
        <h1 class="display-5 fw-bold">Create an account and join the service workspace.</h1>
    </section>
    <section class="d-flex align-items-center justify-content-center">
        <div class="auth-panel">
            <h2 class="fw-bold mb-2">Register</h2>
            <p class="text-muted mb-4">Enter valid details to create your account.</p>
            <form id="registerForm" class="vstack gap-3">
                <input class="form-control form-control-lg" name="username" placeholder="Username" required minlength="3">
                <input class="form-control form-control-lg" type="email" name="email" placeholder="Email" required>
                <input class="form-control form-control-lg" name="phone" placeholder="Phone">
                <input class="form-control form-control-lg" type="password" name="password" placeholder="Password" required minlength="8">
                <button class="btn btn-success btn-lg" type="submit">Create account</button>
            </form>
            <div id="message" hidden></div>
            <div class="mt-4 d-flex justify-content-between align-items-center">
                <a th:href="@{/login}">Back to login</a>
                <a th:href="@{/vendor/register}">Vendor sign up</a>
            </div>
        </div>
    </section>
</div>
<script th:src="@{/js/app.js}"></script>
<script>
document.getElementById('registerForm').addEventListener('submit', async (e) => {
  e.preventDefault();
  const form = e.target;
  const button = form.querySelector('button[type="submit"]');
  const message = document.getElementById('message');
  clearInlineAlert(message);
  setButtonLoading(button, true, 'Creating account...');
  const payload = Object.fromEntries(new FormData(e.target).entries());
  const res = await fetch('/api/auth/register', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify(payload)
  });
  const data = await res.json().catch(() => ({}));
  setButtonLoading(button, false);
  showInlineAlert(message, data.message || (res.ok ? 'Registration successful' : 'Registration failed'), res.ok ? 'success' : 'danger', res.ok ? 'Account Created' : 'Registration Failed');
});
</script>
</body>
</html>
