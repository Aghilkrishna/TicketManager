<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <th:block th:replace="~{fragments/layout :: head('All Support Tickets')}"></th:block>
</head>
<body>
<div class="app-shell">
    <aside th:replace="~{fragments/layout :: sidebar('admin', 'support-tickets')}"></aside>
    <div class="main-panel">
        <header th:replace="~{fragments/layout :: topbar('All Support Tickets', 'Review every support ticket across the platform')}"></header>
        <main class="content-area">
            <section class="hero-banner glass-card mb-4">
                <h1 class="h2 fw-bold mb-2">All Support Tickets</h1>
                <p class="mb-0">Search, filter, and maintain the full ticket inventory from the admin workspace.</p>
            </section>
            <section class="toolbar-card glass-card mb-4">
                <div class="toolbar-grid">
                    <input id="adminSearch" class="form-control" placeholder="Search title or description">
                    <select id="adminStatus" class="form-select"><option value="">All status</option><option>OPEN</option><option>IN_PROGRESS</option><option>ON_HOLD</option><option>RESOLVED</option><option>CLOSED</option><option>CANCELLED</option></select>
                    <select id="adminPriority" class="form-select"><option value="">All priority</option><option>LOW</option><option>MEDIUM</option><option>HIGH</option><option>CRITICAL</option></select>
                    <select id="adminSortBy" class="form-select"><option value="updatedAt">Last Updated</option><option value="createdAt">Created</option><option value="scheduleDate">Schedule Date</option><option value="serviceType">Service Type</option><option value="createdBy">Created By</option></select>
                    <select id="adminDirection" class="form-select"><option value="desc">Descending</option><option value="asc">Ascending</option></select>
                    <button id="adminApply" class="btn btn-dark">Apply</button>
                </div>
            </section>
            <section class="table-card glass-card">
                <div class="d-flex justify-content-between align-items-center mb-3">
                    <div class="section-title">Ticket Inventory</div>
                </div>
                <div id="adminTicketError" class="alert alert-danger d-none" role="alert"></div>
                <div class="table-responsive">
                    <table class="table align-middle">
                        <thead>
                        <tr>
                            <th>S.No</th><th>Title</th><th>Type</th><th>Created By</th><th>Description</th><th>Schedule Date</th><th>Status</th><th>Priority</th><th>Assigned Users</th><th class="text-end">Actions</th>
                        </tr>
                        </thead>
                        <tbody id="adminTicketTable"></tbody>
                    </table>
                </div>
                <div class="pagination-wrap">
                    <div id="adminPaginationSummary" class="text-muted small"></div>
                    <div id="adminPaginationList" class="pagination-list"></div>
                </div>
            </section>
        </main>
    </div>
</div>
<script th:src="@{/js/app.js}"></script>
<script src="https://cdn.jsdelivr.net/npm/sockjs-client@1/dist/sockjs.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/stompjs@2.3.3/lib/stomp.min.js"></script>
<script>
let adminPage = 0;
const adminPageSize = 10;
const refreshAdminTicketsDebounced = debounce(() => loadAdminTickets(), 400);
let lastAdminTicketRefreshToastAt = 0;

function renderAdminPagination(data) {
  const list = document.getElementById('adminPaginationList');
  const summary = document.getElementById('adminPaginationSummary');
  list.innerHTML = '';
  summary.textContent = `Showing page ${data.number + 1} of ${Math.max(data.totalPages, 1)} · ${data.totalElements} tickets`;
  const addButton = (label, page, disabled = false, active = false) => {
    const button = document.createElement('button');
    button.className = 'page-link-btn' + (active ? ' active' : '');
    button.textContent = label;
    button.disabled = disabled;
    button.addEventListener('click', () => {
      adminPage = page;
      loadAdminTickets();
    });
    list.appendChild(button);
  };
  addButton('Prev', Math.max(adminPage - 1, 0), data.first);
  for (let i = 0; i < data.totalPages; i++) {
    addButton(String(i + 1), i, false, i === data.number);
  }
  addButton('Next', Math.min(adminPage + 1, Math.max(data.totalPages - 1, 0)), data.last);
}

async function loadAdminTickets() {
  const params = new URLSearchParams({
    adminScope: 'true',
    assignedOnly: 'false',
    page: String(adminPage),
    size: String(adminPageSize),
    search: document.getElementById('adminSearch').value,
    status: document.getElementById('adminStatus').value,
    priority: document.getElementById('adminPriority').value,
    sortBy: document.getElementById('adminSortBy').value,
    direction: document.getElementById('adminDirection').value
  });
  const res = await fetch('/api/tickets?' + params.toString());
  const errorBox = document.getElementById('adminTicketError');
  if (!res.ok) {
    const payload = await res.json().catch(() => ({}));
    errorBox.textContent = payload.message || 'Failed to load tickets';
    errorBox.classList.remove('d-none');
    document.getElementById('adminTicketTable').innerHTML = '';
    document.getElementById('adminPaginationSummary').textContent = '';
    document.getElementById('adminPaginationList').innerHTML = '';
    return;
  }
  errorBox.classList.add('d-none');
  const data = await res.json();
  const table = document.getElementById('adminTicketTable');
  table.innerHTML = '';
  (data.content || []).forEach((ticket, index) => {
    const assignedUsers = [ticket.assignedTo, ...(ticket.serviceUsers || [])].filter(Boolean).join(', ');
    table.innerHTML += `
      <tr>
        <td>${adminPage * adminPageSize + index + 1}</td>
        <td><a class="fw-semibold text-decoration-none" href="/tickets/view?id=${ticket.id}">${ticket.title}</a></td>
        <td>${ticket.serviceTypeLabel || '-'}</td>
        <td>${ticket.createdBy || '-'}</td>
        <td><div class="text-muted small">${ticket.description.slice(0, 100)}</div></td>
        <td>${ticket.scheduleDate || '-'}</td>
        <td><span class="status-pill ${ticket.status}">${ticket.status}</span></td>
        <td><span class="priority-pill ${ticket.priority}">${ticket.priority}</span></td>
        <td>${assignedUsers || 'Unassigned'}</td>
        <td class="text-end">
          <a class="btn btn-sm btn-outline-secondary" href="/tickets/view?id=${ticket.id}" title="View"><i class="bi bi-eye"></i></a>
          <a class="btn btn-sm btn-outline-primary" href="/tickets/edit?id=${ticket.id}" title="Update"><i class="bi bi-pencil"></i></a>
          <button class="btn btn-sm btn-outline-danger" type="button" title="Delete" onclick="deleteTicket(${ticket.id})"><i class="bi bi-trash"></i></button>
        </td>
      </tr>`;
  });
  renderAdminPagination(data);
}

async function deleteTicket(ticketId) {
  const confirmed = window.confirm(`Delete ticket #${ticketId}?`);
  if (!confirmed) return;
  const res = await fetch(`/api/tickets/${ticketId}`, {method: 'DELETE'});
  if (res.ok) {
    await loadAdminTickets();
    return;
  }
  const payload = await res.json().catch(() => ({}));
  window.alert(payload.message || 'Failed to delete ticket');
}

document.getElementById('adminApply').addEventListener('click', () => {
  adminPage = 0;
  loadAdminTickets();
});

loadAdminTickets();

if (typeof SockJS !== 'undefined' && typeof Stomp !== 'undefined') {
  const socket = new SockJS('/ws');
  const refreshClient = Stomp.over(socket);
  refreshClient.connect({}, () => {
    refreshClient.subscribe('/topic/tickets-refresh', () => {
      refreshAdminTicketsDebounced();
      const now = Date.now();
      if (now - lastAdminTicketRefreshToastAt > 5000) {
        showAppAlert('Support ticket list auto-refreshed with the latest changes.', 'info', 'Live Update');
        lastAdminTicketRefreshToastAt = now;
      }
    });
  });
}
</script>
</body>
</html>
