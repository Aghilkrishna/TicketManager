<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <th:block th:replace="~{fragments/layout :: head('Chat')}"></th:block>
</head>
<body>
<div class="app-shell">
    <aside th:replace="~{fragments/layout :: sidebar('chat', '')}"></aside>
    <div class="main-panel">
        <header th:replace="~{fragments/layout :: topbar('Realtime Chat', '')}"></header>
        <main class="content-area">
            <div class="chat-layout">
                <section class="chat-sidebar-card glass-card">
                    <div class="chat-sidebar-top">
                        <div class="chat-profile-pill">
                            <div class="chat-avatar chat-avatar-lg" id="sidebarCurrentUserAvatar">U</div>
                            <div>
                                <div class="section-title" id="sidebarCurrentUserName">Chat</div>
                                <div class="table-subtitle">Direct messages</div>
                            </div>
                        </div>
                        <button class="chat-action-btn" type="button" id="newChatToggle" title="New chat">
                            <i class="bi bi-pencil-square"></i>
                        </button>
                    </div>

                    <div class="chat-search-panel">
                        <div class="chat-search-box">
                            <i class="bi bi-search"></i>
                            <input id="userSearch" class="form-control" placeholder="Search users by name, email or phone">
                        </div>
                    </div>

                    <div class="chat-sidebar-section">
                        <div class="chat-sidebar-heading">
                            <span>Chats</span>
                        </div>
                        <div id="conversationList" class="conversation-list"></div>
                    </div>

                    <div class="chat-sidebar-section chat-contacts-section">
                        <div class="chat-sidebar-heading">
                            <span>Contacts</span>
                        </div>
                        <div id="userResults" class="chat-user-results"></div>
                    </div>
                </section>

                <section class="chat-card glass-card">
                    <div class="chat-header">
                        <div class="chat-contact">
                            <div class="chat-avatar" id="chatHeaderAvatar">C</div>
                            <div class="chat-header-meta">
                                <div class="section-title" id="chatTitle">Conversation</div>
                                <div class="table-subtitle" id="chatSubtitle">Select an existing chat or start a new one.</div>
                            </div>
                        </div>
                        <div class="chat-header-actions">
                            <div class="typing-indicator" id="typingIndicator"></div>
                            <button class="chat-header-btn" type="button" title="Search"><i class="bi bi-search"></i></button>
                            <button class="chat-header-btn" type="button" title="Voice Call"><i class="bi bi-telephone"></i></button>
                            <button class="chat-header-btn" type="button" title="Video Call"><i class="bi bi-camera-video"></i></button>
                            <button class="chat-header-btn" type="button" title="Info"><i class="bi bi-three-dots-vertical"></i></button>
                        </div>
                    </div>

                    <div id="chatBox" class="chat-messages">
                        <div class="empty-state chat-empty-state">
                            <div class="chat-empty-icon"><i class="bi bi-chat-dots"></i></div>
                            <div class="section-title">Select a conversation</div>
                            <div class="table-subtitle">Choose a chat from the left panel or search for a contact to start messaging.</div>
                        </div>
                    </div>

                    <div id="emojiBar" class="emoji-bar d-none"></div>

                    <form id="chatForm" class="chat-composer">
                        <button class="composer-icon" id="emojiToggle" type="button" title="Emoji"><i class="bi bi-emoji-smile"></i></button>
                        <input id="messageInput" class="form-control composer-input" placeholder="Type your message" required>
                        <button class="composer-icon" type="button" title="Attach file"><i class="bi bi-paperclip"></i></button>
                        <button class="btn btn-primary composer-send" type="submit"><i class="bi bi-send"></i></button>
                    </form>
                </section>
            </div>
        </main>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/sockjs-client@1/dist/sockjs.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/stompjs@2.3.3/lib/stomp.min.js"></script>
<script th:src="@{/js/app.js}"></script>
<script>
let activeRecipientId = null;
let activeConversationId = null;
let activeConversationName = null;
let currentUsername = null;
let conversations = [];
let stompClient = null;
let typingTimeout = null;
const EMOJIS = ['😀', '😂', '😊', '😍', '👍', '🙏', '🔥', '🎉', '✅', '💬', '🚀', '😎'];

function initials(value) {
  return (value || '?').trim().charAt(0).toUpperCase();
}

function updateChatHeader(name, subtitle) {
  document.getElementById('chatTitle').textContent = name;
  document.getElementById('chatSubtitle').textContent = subtitle;
  document.getElementById('chatHeaderAvatar').textContent = initials(name);
}

function deliveryLabel(status) {
  switch (status) {
    case 'READ': return 'Seen ✓✓';
    case 'DELIVERED': return 'Delivered ✓✓';
    default: return 'Sent ✓';
  }
}

function escapeHtml(value) {
  return (value || '').replace(/[&<>"']/g, s => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[s]));
}

function appendMessage(msg) {
  const box = document.getElementById('chatBox');
  if (box.querySelector('.empty-state')) box.innerHTML = '';
  const mine = msg.sender === currentUsername;
  const bubbleClass = mine ? 'chat-bubble me' : 'chat-bubble them';
  box.innerHTML += `
    <div class="${bubbleClass}" data-message-id="${msg.id}">
      <strong>${escapeHtml(msg.sender)}</strong>
      <div>${escapeHtml(msg.content).replace(/\n/g, '<br>')}</div>
      ${msg.ticketId ? `<div class="mt-2"><span class="badge text-bg-info">Ticket #${msg.ticketId}</span></div>` : ''}
      <div class="message-meta">
        <span>${new Date(msg.createdAt).toLocaleTimeString([], {hour: '2-digit', minute: '2-digit'})}</span>
        <span class="message-status">${mine ? deliveryLabel(msg.deliveryStatus) : ''}</span>
      </div>
    </div>`;
  box.scrollTop = box.scrollHeight;
}

function conversationCard(item) {
  const preview = item.lastMessage ? escapeHtml(item.lastMessage) : 'No messages yet';
  const timestamp = item.lastMessageAt
    ? new Date(item.lastMessageAt).toLocaleTimeString([], {hour: '2-digit', minute: '2-digit'})
    : '';
  return `
    <button type="button" class="conversation-item ${item.id === activeConversationId ? 'active' : ''}" data-id="${item.id}" data-other-id="${item.otherUserId}" data-other-name="${escapeHtml(item.otherUsername)}">
      <div class="chat-avatar">${initials(item.otherUsername)}</div>
      <div class="conversation-body">
        <div class="conversation-meta">
          <strong class="conversation-name">${escapeHtml(item.otherUsername)}</strong>
          <span class="conversation-time">${timestamp}</span>
        </div>
        <div class="conversation-preview">${preview}</div>
      </div>
      <div class="conversation-side">
        ${item.unreadCount ? `<span class="unread-badge">${item.unreadCount}</span>` : '<span class="conversation-dot"></span>'}
      </div>
    </button>`;
}

function bindConversationClicks(root) {
  root.querySelectorAll('.conversation-item').forEach(button => button.addEventListener('click', async () => {
    activeConversationId = Number(button.dataset.id);
    activeRecipientId = Number(button.dataset.otherId);
    activeConversationName = button.dataset.otherName;
    updateChatHeader(activeConversationName, 'Messages update in realtime.');
    await loadConversation(activeConversationId);
    await loadConversations();
  }));
}

function renderConversationSections(items) {
  const root = document.getElementById('conversationList');
  root.innerHTML = items.length ? items.map(conversationCard).join('') : '<div class="empty-state">No chats yet.</div>';
  bindConversationClicks(root);
}

async function loadConversations(query = '') {
  const res = await fetch('/api/chat/conversations' + (query ? ('?query=' + encodeURIComponent(query)) : ''));
  conversations = await res.json();
  renderConversationSections(conversations);
}

async function loadConversation(conversationId) {
  const res = await fetch(`/api/chat/conversations/${conversationId}/messages`);
  const messages = await res.json();
  const box = document.getElementById('chatBox');
  box.innerHTML = '';
  messages.forEach(appendMessage);
}

function emitTyping(isTyping) {
  if (!stompClient || !stompClient.connected || (!activeConversationId && !activeRecipientId)) return;
  stompClient.send('/app/chat.typing', {}, JSON.stringify({
    conversationId: activeConversationId,
    recipientId: activeRecipientId,
    username: currentUsername,
    typing: isTyping
  }));
}

function populateEmojiBar() {
  const bar = document.getElementById('emojiBar');
  bar.innerHTML = EMOJIS.map(emoji => `<button class="emoji-btn" type="button">${emoji}</button>`).join('');
  bar.querySelectorAll('.emoji-btn').forEach(button => button.addEventListener('click', () => {
    const input = document.getElementById('messageInput');
    input.value += button.textContent;
    input.focus();
  }));
}

fetch('/api/auth/me').then(r => r.json()).then(async me => {
  currentUsername = me.username;
  document.getElementById('sidebarCurrentUserName').textContent = me.username;
  document.getElementById('sidebarCurrentUserAvatar').textContent = initials(me.username);
  updateChatHeader('Conversation', 'Select an existing chat or start a new one.');
  populateEmojiBar();
  await loadConversations();
});

document.getElementById('newChatToggle').addEventListener('click', () => {
  document.getElementById('userSearch').focus();
});

document.getElementById('userSearch').addEventListener('input', async () => {
  const query = document.getElementById('userSearch').value;
  const list = document.getElementById('userResults');
  if (!query) {
    list.innerHTML = '';
    return;
  }
  const res = await fetch('/api/users/search?query=' + encodeURIComponent(query));
  const users = await res.json();
  list.innerHTML = '';
  users.forEach(user => {
    const card = document.createElement('button');
    card.type = 'button';
    card.className = 'conversation-item';
    card.innerHTML = `
      <div class="chat-avatar">${initials(user.username)}</div>
      <div class="conversation-body">
        <div class="conversation-meta">
          <strong class="conversation-name">${escapeHtml(user.username)}</strong>
        </div>
        <div class="conversation-preview">${escapeHtml(user.email || 'Start a new conversation')}</div>
      </div>
      <div class="conversation-side"><span class="conversation-dot"></span></div>`;
    card.onclick = () => {
      activeRecipientId = user.id;
      activeConversationId = null;
      activeConversationName = user.username;
      updateChatHeader(user.username, 'New conversation');
      document.getElementById('chatBox').innerHTML = `<div class="empty-state chat-empty-state"><div class="chat-empty-icon"><i class="bi bi-chat-square-text"></i></div><div class="section-title">${escapeHtml(user.username)}</div><div class="table-subtitle">Send the first message to start this conversation.</div></div>`;
    };
    list.appendChild(card);
  });
});

document.getElementById('emojiToggle').addEventListener('click', () => {
  document.getElementById('emojiBar').classList.toggle('d-none');
});

document.getElementById('messageInput').addEventListener('input', () => {
  emitTyping(true);
  window.clearTimeout(typingTimeout);
  typingTimeout = window.setTimeout(() => emitTyping(false), 1200);
});

document.getElementById('chatForm').addEventListener('submit', async (e) => {
  e.preventDefault();
  const payload = {
    conversationId: activeConversationId,
    recipientId: activeRecipientId,
    content: document.getElementById('messageInput').value
  };
  const res = await fetch('/api/chat/messages', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify(payload)
  });
  const msg = await res.json();
  activeConversationId = msg.conversationId;
  appendMessage(msg);
  emitTyping(false);
  document.getElementById('typingIndicator').textContent = '';
  await loadConversations();
  e.target.reset();
});

const socket = new SockJS('/ws');
stompClient = Stomp.over(socket);
stompClient.connect({}, () => {
  stompClient.subscribe('/user/queue/chat', async ({body}) => {
    const msg = JSON.parse(body);
    if (activeConversationId === msg.conversationId) {
      appendMessage(msg);
      document.getElementById('typingIndicator').textContent = '';
      await loadConversation(msg.conversationId);
    }
    await loadConversations();
  });

  stompClient.subscribe('/user/queue/chat-status', ({body}) => {
    const status = JSON.parse(body);
    const bubble = document.querySelector(`[data-message-id="${status.messageId}"] .message-status`);
    if (bubble) bubble.textContent = deliveryLabel(status.status);
  });

  stompClient.subscribe('/user/queue/chat-typing', ({body}) => {
    const event = JSON.parse(body);
    if ((activeConversationId && event.conversationId === activeConversationId) || (!activeConversationId && event.recipientId === activeRecipientId)) {
      document.getElementById('typingIndicator').textContent = event.typing ? `${event.username} is typing...` : '';
    }
  });
});
</script>
</body>
</html>
