<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Reset Password</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card shadow-sm">
                <div class="card-body">
                    <h1 class="h4 mb-3">Password Reset</h1>
                    <form id="requestForm" class="vstack gap-3" th:if="${token == null}">
                        <input class="form-control" type="email" name="email" placeholder="Email" required>
                        <button class="btn btn-primary" type="submit">Send reset link</button>
                    </form>
                    <form id="confirmForm" class="vstack gap-3" th:if="${token != null}">
                        <input class="form-control" type="password" name="newPassword" placeholder="New password" required minlength="8">
                        <button class="btn btn-success" type="submit">Update password</button>
                    </form>
                    <div id="message" class="small mt-3"></div>
                </div>
            </div>
        </div>
    </div>
</div>
<script th:inline="javascript">
const token = /*[[${token}]]*/ null;
const requestForm = document.getElementById('requestForm');
const confirmForm = document.getElementById('confirmForm');
if (requestForm) {
  requestForm.addEventListener('submit', async (e) => {
    e.preventDefault();
    const payload = Object.fromEntries(new FormData(e.target).entries());
    const res = await fetch('/api/auth/password-reset', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify(payload)
    });
    document.getElementById('message').textContent = await res.text();
  });
}
if (confirmForm) {
  confirmForm.addEventListener('submit', async (e) => {
    e.preventDefault();
    const payload = {token, newPassword: new FormData(e.target).get('newPassword')};
    const res = await fetch('/api/auth/password-reset/confirm', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify(payload)
    });
    document.getElementById('message').textContent = await res.text();
  });
}
</script>
</body>
</html>
